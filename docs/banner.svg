<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="textFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" rx="20" fill="#0f0f14"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="320" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="320" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="320" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative gradient glow behind logo -->
  <circle cx="200" cy="160" r="120" fill="url(#bg)" opacity="0.08"/>

  <!-- Logo mark — decision diamond with ranking bars -->
  <g transform="translate(140, 100)">
    <!-- Diamond outline -->
    <path d="M60 0 L120 60 L60 120 L0 60 Z" fill="none" stroke="url(#bg)" stroke-width="8" stroke-linejoin="round"/>
    <!-- Three ranking bars -->
    <rect x="27" y="42" width="66" height="8" rx="4" fill="#6366f1" opacity="0.95"/>
    <rect x="33" y="55" width="54" height="8" rx="4" fill="#8b5cf6" opacity="0.6"/>
    <rect x="39" y="68" width="42" height="8" rx="4" fill="#a78bfa" opacity="0.35"/>
  </g>

  <!-- Wordmark: Decision OS -->
  <text x="310" y="150" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">
    Decision
    <tspan fill="url(#textFill)"> OS</tspan>
  </text>

  <!-- Tagline -->
  <text x="314" y="195" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#9ca3af" letter-spacing="0.5">
    Structured decision-making for humans who think clearly.
  </text>

  <!-- Feature pills -->
  <g transform="translate(314, 225)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="140" height="32" rx="16" fill="white" opacity="0.06"/>
    <text x="70" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="500">Weighted Scoring</text>

    <!-- Pill 2 -->
    <rect x="152" y="0" width="170" height="32" rx="16" fill="white" opacity="0.06"/>
    <text x="237" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="500">Sensitivity Analysis</text>

    <!-- Pill 3 -->
    <rect x="334" y="0" width="110" height="32" rx="16" fill="white" opacity="0.06"/>
    <text x="389" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="500">Local-First</text>

    <!-- Pill 4 -->
    <rect x="456" y="0" width="120" height="32" rx="16" fill="white" opacity="0.06"/>
    <text x="516" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="500">Open Source</text>
  </g>

  <!-- Decorative dots (right side) -->
  <g opacity="0.08">
    <circle cx="1050" cy="80" r="4" fill="#6366f1"/>
    <circle cx="1080" cy="80" r="4" fill="#6366f1"/>
    <circle cx="1110" cy="80" r="4" fill="#6366f1"/>
    <circle cx="1050" cy="110" r="4" fill="#6366f1"/>
    <circle cx="1080" cy="110" r="4" fill="#8b5cf6"/>
    <circle cx="1110" cy="110" r="4" fill="#6366f1"/>
    <circle cx="1050" cy="140" r="4" fill="#6366f1"/>
    <circle cx="1080" cy="140" r="4" fill="#6366f1"/>
    <circle cx="1110" cy="140" r="4" fill="#a78bfa"/>
    <circle cx="1140" cy="80" r="4" fill="#6366f1"/>
    <circle cx="1170" cy="80" r="4" fill="#8b5cf6"/>
    <circle cx="1140" cy="110" r="4" fill="#a78bfa"/>
    <circle cx="1170" cy="110" r="4" fill="#6366f1"/>
    <circle cx="1200" cy="80" r="4" fill="#6366f1"/>
    <circle cx="1140" cy="140" r="4" fill="#6366f1"/>
    <circle cx="1170" cy="140" r="4" fill="#6366f1"/>
    <circle cx="1200" cy="110" r="4" fill="#8b5cf6"/>
    <circle cx="1200" cy="140" r="4" fill="#6366f1"/>
  </g>

  <!-- Decorative small diamond (bottom right) -->
  <g transform="translate(1130, 200)" opacity="0.1">
    <path d="M30 0 L60 30 L30 60 L0 30 Z" fill="none" stroke="url(#bg)" stroke-width="3" stroke-linejoin="round"/>
    <rect x="10" y="24" width="40" height="4" rx="2" fill="#8b5cf6"/>
    <rect x="14" y="31" width="32" height="4" rx="2" fill="#8b5cf6" opacity="0.6"/>
  </g>
</svg>
