name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["type:feature"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below to help us understand your idea.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the feature you'd like.
      placeholder: What should Decision OS do that it doesn't today?
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: Describe from the user's perspective.
      placeholder: "As a [type of user], I want [goal] so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What conditions must be met for this feature to be considered complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - "Critical — blocking my use of the app"
        - "High — significantly impacts my workflow"
        - "Medium — would be a nice improvement"
        - "Low — nice to have someday"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app would this feature affect?
      multiple: true
      options:
        - "Decision Builder (UI)"
        - "Results View"
        - "Sensitivity Analysis"
        - "Scoring Engine / Algorithms"
        - "Data Import/Export"
        - "Persistence / Storage"
        - "Accessibility"
        - "Performance"
        - "CI/CD / Infrastructure"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links to related issues or academic papers.
